<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Prototipo Ejemplo v1 — Skandia UX</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9fafb;color:#111827;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:2.5rem 2rem;max-width:480px;width:100%;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{width:52px;height:52px;background:#006633;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:.95rem;margin:0 auto 1.25rem}
.badge{display:inline-block;background:#d1fae5;color:#065f46;font-size:.75rem;font-weight:700;padding:.22rem .7rem;border-radius:20px;margin-bottom:1.25rem;text-transform:uppercase;letter-spacing:.05em}
h1{font-size:1.4rem;font-weight:700;margin-bottom:.75rem}
p{color:#6b7280;line-height:1.6;font-size:.92rem;margin-bottom:1.75rem}
code{background:#f3f4f6;border-radius:4px;padding:.1rem .3rem;font-size:.85em}
.back{display:inline-flex;align-items:center;gap:.4rem;color:#006633;font-size:.88rem;font-weight:600;border:1.5px solid #006633;padding:.5rem 1.2rem;border-radius:8px;transition:all .15s;text-decoration:none}
.back:hover{background:#006633;color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="logo">UX</div>
  <span class="badge">v1 &#8212; Aprobado</span>
  <h1>Prototipo Ejemplo</h1>
  <p>
    Este artefacto verifica el flujo completo del repositorio UX de Skandia:<br>
    creacion &rarr; <code>git push</code> &rarr; catalogo automatico &rarr; GitHub Pages.
  </p>
  <a href="../../../catalog/" class="back">&#8592; Ver catalogo completo</a>
</div>
</body>
</html>
